<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hashstore Folder Browser</title>
        <style>
            body {
                font-family:
                    system-ui,
                    -apple-system,
                    sans-serif;
                padding: 20px;
                background: #f8f9fa;
            }
            #browser {
                max-width: 800px;
                margin: 0 auto;
                background: white;
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            }
            .controls {
                padding: 15px;
                border-bottom: 1px solid #eee;
                display: flex;
                gap: 10px;
                align-items: center;
            }
            select {
                flex-grow: 1;
                padding: 8px;
                border-radius: 4px;
                border: 1px solid #ddd;
            }
            .breadcrumb {
                padding: 10px 15px;
                background: #f1f3f5;
                font-family: Consolas, "Lucida Console", Monaco, monospace;
                color: #666;
                border-bottom: 1px solid #eee;
            }
            .entry {
                padding: 12px 15px;
                border-bottom: 1px solid #f1f1f1;
                cursor: pointer;
                display: flex;
                align-items: center;
                transition: background 0.1s;
            }
            .entry:hover {
                background: #f8fbff;
            }
            .icon {
                margin-right: 12px;
                width: 20px;
                text-align: center;
            }
            .folder {
                color: #000000;
                font-weight: 500;
            }
            .file {
                color: #444;
                cursor: default;
            }
            .loading {
                padding: 40px;
                text-align: center;
                color: #999;
            }
            .navigable {
                cursor: pointer;
            }
            .filesize {
                font-family: Consolas, "Lucida Console", Monaco, monospace;
                font-size: smaller;
                display: inline-block;
                padding-left: 20px;
            }
        </style>
    </head>
    <body>
        <div id="browser">
            <div class="controls">
                <label for="root-selector"><strong>Source:</strong></label>
                <select id="root-selector"></select>
            </div>
            <div class="breadcrumb" id="path-display">
                Select a source to begin
            </div>
            <div class="breadcrumb" id="folder-stats"></div>
            <div id="file-list"></div>
        </div>

        <script type="module">
            // Using hyparquet via ESM CDN
            import {
                parquetRead,
                parquetMetadataAsync,
                asyncBufferFromUrl,
            } from "https://cdn.jsdelivr.net/npm/hyparquet@1.25.6/+esm";

            const delim = "→";
            const BASE_URL = `http://localhost:2011/v1/object/`;
            const selector = document.getElementById("root-selector");
            const listElement = document.getElementById("file-list");
            const pathElement = document.getElementById("path-display");
            const statsElement = document.getElementById("folder-stats");

            async function loadRootPidList() {
                return [
                    "doi:10.18739/A2B853K56",
                    "doi:10.18739/A2B27PT14",
                    "root_1",
                ];
            }

            async function buildPidSelection() {
                const pids = await loadRootPidList();
                selector.innerHTML = "";
                pids.forEach((pid) => {
                    const o = document.createElement("option");
                    o.value = pid;
                    o.innerHTML = pid;
                    selector.appendChild(o);
                });
            }

            function composeUrl(pid, path_parts) {
                const path = path_parts.join(delim);
                if (path === "") return `${BASE_URL}${pid}`;
                else return `${BASE_URL}${pid}%20${path}`;
            }

            function splitUrl(url) {
                const parts = url.split("%20");
                const pid = parts[0];
                const path_parts = parts.slice(1).join("%20").split(delim);
                return { pid, path_parts };
            }

            function pathDisplay(pid, path) {
                pathElement.innerHTML = "";
                const ele = document.createElement("span");
                ele.innerHTML = `${pid} `;
                if (path.length > 0) {
                    ele.className = "navigable";
                    ele.onclick = () => {
                        loadFolder(pid, []);
                    };
                }
                pathElement.appendChild(ele);
                path.forEach((p, i) => {
                    const e = document.createElement("span");
                    if (i < path.length - 1) {
                        e.className = "navigable";
                        e.innerHTML = `${p}${delim}`;
                        e.onclick = () => {
                            loadFolder(pid, path.slice(0, i + 1));
                        };
                    } else {
                        e.innerHTML = p;
                    }
                    pathElement.appendChild(e);
                });
            }

            function formatBytes(bytes) {
                if (!bytes) return "0 B";
                const k = 1024;
                const sizes = ["B", "KB", "MB", "GB", "TB"];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                // Now that 'bytes' is a Number, toFixed() works perfectly
                return (
                    parseFloat((bytes / Math.pow(k, i)).toFixed(2)) +
                    " " +
                    sizes[i]
                );
            }

            async function loadFolder(pid, path = []) {
                const url = composeUrl(pid, path);
                console.log(
                    `loadFolder: ${url} | PID: ${pid} | Path: ${path.join("/")}`,
                );

                listElement.innerHTML =
                    '<div class="loading">Parsing Parquet with hyparquet...</div>';
                //pathElement.textContent = `${pid} ${path.join("/")}`;
                pathDisplay(pid, path);

                try {
                    const file = await asyncBufferFromUrl({ url });
                    const pqmetadata = await parquetMetadataAsync(file);
                    let metadata = {};
                    if (pqmetadata.key_value_metadata) {
                        pqmetadata.key_value_metadata.forEach(
                            ({ key, value }) => {
                                if (
                                    key ==
                                    "https://ns.dataone.org/types/FolderEntries"
                                ) {
                                    metadata = JSON.parse(value);
                                    metadata.pathpath = metadata.pid;
                                    metadata.pid = metadata.pid.split(" ")[0];
                                }
                            },
                        );
                    }
                    console.log(metadata);
                    if (metadata.pid !== pid) {
                        return loadFolder(metadata.pid);
                    }
                    const entries = [];
                    await parquetRead({
                        file,
                        columns: ["name", "is_file", "size"],
                        rowFormat: "object",
                        onComplete: (rows) => {
                            // rows is an array of objects: [{name: '...', type: 0}, ...]
                            const processedRows = rows.map((r) => ({
                                name: r.name,
                                is_file: r.is_file,
                                size: r.size,
                            }));
                            entries.push(...processedRows);
                        },
                    });

                    // Sort: Folders (0) first, then Files (1)
                    entries.sort(
                        (a, b) =>
                            a.is_file - b.is_file ||
                            a.name.localeCompare(b.name),
                    );

                    render(entries, pid, path);
                } catch (e) {
                    listElement.innerHTML = `<div class="loading" style="color:red">Error: ${e.message}</div>`;
                }
            }

            function makeItemUrl(pid, path, name) {
                const target = composeUrl(pid, [...path, name]);
                if (name.endsWith(".parquet")) {
                    /*
                    const url = new URL(
                        "https://hyparam.github.io/demos/hyparquet/",
                    );
                    url.searchParams.set("key", target);
                    */
                    const url = new URL("https://manzt.github.io/quak/");
                    url.searchParams.set("source", target);
                    return url.toString();
                }
                return target;
            }

            function render(entries, currentPid, currentPath) {
                listElement.innerHTML = "";
                /*
                if (currentPath.length > 0) {
                    const back = document.createElement("div");
                    back.className = "entry folder";
                    back.innerHTML = `<span class="icon">⤴</span> .. (Back)`;
                    back.onclick = () => {
                        loadFolder(currentPid, currentPath.slice(0, -1));
                    };
                    listElement.appendChild(back);
                }
                */
                const stats = { entries: entries.length, bytes: 0 };
                entries.forEach((entry) => {
                    const div = document.createElement("div");
                    div.className = `entry ${entry.is_file ? "file" : "folder"}`;
                    if (!entry.is_file) {
                        div.innerHTML = `<span class="icon">📁</span> ${entry.name} <span class="filesize">${entry.size} entries</span>`;
                    } else {
                        div.innerHTML = `<span class="icon">📄</span><a target="_blank" href="${makeItemUrl(currentPid, currentPath, entry.name)}">${entry.name}</a><span class="filesize">${formatBytes(Number(entry.size))}</span>`;
                        stats.bytes = stats.bytes + Number(entry.size);
                    }

                    if (!entry.is_file) {
                        div.onclick = () => {
                            loadFolder(currentPid, [
                                ...currentPath,
                                entry.name,
                            ]);
                        };
                    }
                    listElement.appendChild(div);
                });
                statsElement.innerHTML = `${stats.entries} entries ${formatBytes(stats.bytes)}`;
            }

            selector.onchange = () => {
                loadFolder(selector.value, []);
            };

            // Initial load
            await buildPidSelection();
            loadFolder(selector.value, []);
        </script>
    </body>
</html>
