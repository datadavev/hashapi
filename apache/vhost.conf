<VirtualHost *:80>
    ServerName localhost

    # Reverse Proxy to Uvicorn
    ProxyPass / http://fastapi:8000/
    ProxyPassReverse / http://fastapi:8000/

    # XSendFile Configuration
    XSendFile On
    XSendFilePath /var/data/hashstore

    Header always set Access-Control-Allow-Origin "*"
    Header always set Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
    Header always set Access-Control-Allow-Headers "Range, Content-Type"
    Header always set Access-Control-Expose-Headers "Content-Range, Content-Length, Accept-Ranges"

    RewriteEngine On
    RewriteCond %{REQUEST_METHOD} OPTIONS
    RewriteRule ^(.*)$ $1 [R=200,L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
